name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm test

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      # prisma generate + tsc (no live DB needed for generate)
      - run: npm run build

  migrations:
    name: Migrations
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Run prisma migrate deploy
        env:
          DATABASE_URL: postgresql://testuser:testpass@localhost:5432/testdb
        run: npx prisma migrate deploy
      - name: Assert critical unique indexes exist
        env:
          PGPASSWORD: testpass
        run: |
          psql -h localhost -U testuser -d testdb -c "
            SELECT indexname FROM pg_indexes
            WHERE tablename IN ('Payment','Invoice','Event','WebhookDelivery','ApiKey','Operator')
              AND indexname IN (
                'Payment_network_txHash_logIndex_key',
                'Invoice_depositAddress_key',
                'Event_derivationAccount_key',
                'WebhookDelivery_eventUid_key',
                'WebhookDelivery_invoiceId_endpointId_version_key',
                'ApiKey_hashedKey_key',
                'Operator_email_key'
              )
            ORDER BY indexname;
          " | tee /tmp/index_check.txt
          # Verify all 7 critical indexes are present
          node -e "
            const fs = require('fs');
            const out = fs.readFileSync('/tmp/index_check.txt', 'utf8');
            const required = [
              'Payment_network_txHash_logIndex_key',
              'Invoice_depositAddress_key',
              'Event_derivationAccount_key',
              'WebhookDelivery_eventUid_key',
              'WebhookDelivery_invoiceId_endpointId_version_key',
              'ApiKey_hashedKey_key',
              'Operator_email_key',
            ];
            const missing = required.filter(idx => !out.includes(idx));
            if (missing.length > 0) {
              console.error('MISSING INDEXES:', missing);
              process.exit(1);
            }
            console.log('All', required.length, 'critical unique indexes verified.');
          "

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high
